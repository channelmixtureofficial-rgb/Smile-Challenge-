<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Minute Smile Challenge ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#ffd6e8,#fff7fb);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{

width:90%;
max-width:420px;
background:white;
padding:35px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.15);
text-align:center;
animation:fade .7s;
position:relative;
z-index:5;
}

h1{
font-size:28px;
margin-bottom:20px;
color:#ff4d88;
}

p{

font-size:18px;
margin:20px 0;
color:#555;
line-height:1.6;
}

button{

display:block;
width:100%;
padding:15px;
margin:12px auto;
border:none;
border-radius:50px;
background:#ff4d88;
color:white;
font-size:17px;
cursor:pointer;
transition:.3s;
}

button:hover{

transform:scale(1.05);
background:#ff2f74;
}

.small{

font-size:14px;
color:#999;
margin-top:25px;
}

.heart{

position:absolute;
color:#ff7aa8;
animation:float linear infinite;
user-select:none;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{

opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div id="hearts"></div>

<div class="card" id="card">

<h1>⚠️ Warning</h1>

<p>This website has only one mission...</p>

<p><b>To make you smile in under 60 seconds 😌</b></p>

<button onclick="page2()">Let's see 👀</button>

</div>

<script>

const card=document.getElementById("card");

function page2(){

card.innerHTML=`

<h1>Question #1</h1>

<p>Who's the cutest person reading this right now? 🥺</p>

<button onclick="correct()">Me 😌</button>

<button onclick="correct()">Definitely me 😂</button>

<button onclick="correct()">Obviously me 🤍</button>

`;

}

function correct(){

card.innerHTML=`

<h1>😂❤️</h1>

<p>Correct answer.</p>

<button onclick="page3()">Next ➜</button>

`;

}

function page3(){

card.innerHTML=`

<h1>Question #2</h1>

<p>Who do you think made this?</p>

<button onclick="made()">A nerd 🤓</button>

<button onclick="made()">A simp 😂</button>

<button onclick="made()">A guy who likes making you smile 🤍</button>

`;

}

function made(){

card.innerHTML=`

<h1>😭😂</h1>

<p>Honestly...</p>

<p><b>All three.</b></p>

<button onclick="page4()">Next ➜</button>

`;

}

function page4(){

card.innerHTML=`

<h1>Question #3</h1>

<p>What do you deserve today?</p>

<button onclick="deserve()">A hug 🤍</button>

<button onclick="deserve()">A forehead kiss 😌</button>

<button onclick="deserve()">A really good day ☀️</button>

`;

}

function deserve(){

card.innerHTML=`

<h1>❤️</h1>

<p>Exactly.</p>

<p>You deserve all three.</p>

<button onclick="page5()">Next ➜</button>

`;

}

function page5(){

card.innerHTML=`

<h1>Mission Complete 🎉</h1>

<p>I just wanted to steal one smile from you today.</p>

<p><b>Did I succeed? 😊</b></p>

<button onclick="yes()">Yes 😄</button>

<button onclick="gift()">You owe me another smile 👀</button>

`;

confetti();

}

function yes(){

card.innerHTML=`

<h1>🥹❤️</h1>

<p>YAY!!</p>

<p>Mission accomplished.</p>

<button onclick="finalpage()">Continue ➜</button>

`;

}

function gift(){

card.innerHTML=`

<h1>🎁</h1>

<p>Unlimited Cuddle Coupon 🤍</p>

<p>Redeemable whenever I see you.</p>

<p>Expires: Never 😌</p>

<button onclick="lastquestion()">Continue ➜</button>

`;

}

function lastquestion(){

card.innerHTML=`

<h1>One last question...</h1>

<p>Where's my favourite place? 👀</p>

<button onclick="answer()">The Gym 💪</button>

<button onclick="answer()">My Bed 😂</button>

<button onclick="answer()">With You 🤍</button>

`;

}

function answer(){

card.innerHTML=`

<h1>🤍</h1>

<p>Wrong 😌</p>

<p>Anywhere...</p>

<p><b>As long as you're there.</b></p>

<button onclick="finalpage()">Finish ❤️</button>

`;

}

function finalpage(){

card.innerHTML=`

<h1>Thank You ❤️</h1>

<p>Thank you for giving me a reason to smile these past few days.</p>

<p>Now go enjoy your beautiful day 😊</p>

<div class="small">Made with ❤️ by Krish</div>

`;

}

function confetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div");

c.className="heart";

c.innerHTML=["❤️","🤍","💕","💖","💗"][Math.floor(Math.random()*5)];

c.style.left=Math.random()*100+"vw";

c.style.fontSize=(15+Math.random()*20)+"px";

c.style.animationDuration=(4+Math.random()*5)+"s";

document.body.appendChild(c);

}

}

for(let i=0;i<25;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="🤍";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(10+Math.random()*18)+"px";

h.style.animationDuration=(6+Math.random()*5)+"s";

document.body.appendChild(h);

}

</script>

</body>
</html>
